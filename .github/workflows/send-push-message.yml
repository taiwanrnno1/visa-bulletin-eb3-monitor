name: Send Push Message

on:
  workflow_dispatch:
    inputs:
      title:
        description: "通知標題，留空會自動使用最新公告"
        required: false
        default: ""
      body:
        description: "通知內容，留空會自動使用最新公告"
        required: false
        default: ""

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send browser push message
        env:
          WORKER_BROADCAST_URL: ${{ secrets.WORKER_BROADCAST_URL }}
          WORKER_BROADCAST_SECRET: ${{ secrets.WORKER_BROADCAST_SECRET }}
          PUSH_TITLE: ${{ inputs.title }}
          PUSH_BODY: ${{ inputs.body }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          import visa_bulletin_watch as watcher

          title = os.environ.get("PUSH_TITLE", "").strip()
          body = os.environ.get("PUSH_BODY", "").strip()
          if not title or not body:
              with open("visa_bulletin_state.json", encoding="utf-8") as file:
                  current = json.load(file)
              previous_value = current.get("previous_bulletin_eb3_all_chargeability_final_action_date")
              value = current.get("eb3_all_chargeability_final_action_date")
              movement = watcher.describe_movement(previous_value, value)
              title = title or watcher.build_push_title(movement)
              body = body or watcher.build_push_message(value, previous_value, movement)

          url = (os.environ.get("WORKER_BROADCAST_URL") or "https://visa-bulletin-eb3-push.t6213982-32d.workers.dev/api/broadcast").strip()
          if url.endswith("/"):
              url = url[:-1]
          if not url.endswith("/api/broadcast"):
              url = f"{url}/api/broadcast"
          secret = os.environ.get("WORKER_BROADCAST_SECRET", "")
          if not secret:
              raise SystemExit("Missing GitHub secret: WORKER_BROADCAST_SECRET")
          payload = {
              "notice": {
                  "title": title,
                  "message": body,
                  "current": {},
              }
          }
          request = urllib.request.Request(
              url,
              data=json.dumps(payload).encode("utf-8"),
              method="POST",
              headers={
                  "Authorization": f"Bearer {secret}",
                  "Content-Type": "application/json; charset=utf-8",
                  "User-Agent": "VisaBulletinWatch/1.0 (+github-actions)",
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=45) as response:
                  print(f"Broadcast URL: {url}")
                  print(response.read().decode("utf-8"))
          except urllib.error.HTTPError as error:
              print(f"Broadcast URL: {url}")
              print(f"HTTP status: {error.code}")
              print(error.read().decode("utf-8", errors="replace"))
              raise
          PY

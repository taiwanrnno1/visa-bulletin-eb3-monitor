name: Check Visa Bulletin

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check official Visa Bulletin
        env:
          VISA_BULLETIN_NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python github_action_check.py

      - name: Commit updated bulletin state
        run: |
          if git diff --quiet -- visa_bulletin_state.json; then
            echo "No bulletin state change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add visa_bulletin_state.json
          git commit -m "Update Visa Bulletin state"
          git push
